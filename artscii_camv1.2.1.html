<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII CAM</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --fg: #00ff41; --dim: #2a5c38; --accent: #00cc33;
    --panel: #111; --border: rgba(0,255,65,0.18); --active-bg: rgba(0,255,65,0.13);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);min-height:100vh;display:flex;justify-content:center;padding:1rem;font-family:'Share Tech Mono',monospace;color:var(--fg);}
  #app{width:100%;max-width:1100px;display:flex;gap:12px;}

  /* SIDEBAR */
  #sidebar{width:220px;flex-shrink:0;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:14px;height:fit-content;max-height:98vh;overflow-y:auto;}
  #sidebar::-webkit-scrollbar{width:3px;}
  #sidebar::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px;}
  .s-title{font-family:'VT323',monospace;font-size:22px;letter-spacing:2px;border-bottom:1px solid var(--border);padding-bottom:8px;}
  .s-section{display:flex;flex-direction:column;gap:5px;}
  .s-label{font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;}

  .pill{font-family:'Share Tech Mono',monospace;font-size:10px;background:transparent;color:var(--dim);border:1px solid var(--border);padding:5px 3px;border-radius:5px;cursor:pointer;letter-spacing:0.5px;transition:all 0.15s;text-align:center;}
  .pill:hover{color:var(--fg);border-color:var(--fg);}
  .pill.active{background:var(--active-bg);color:var(--fg);border-color:var(--fg);}

  .cm-btn{font-family:'Share Tech Mono',monospace;font-size:10px;background:transparent;color:var(--dim);border:1px solid var(--border);padding:5px 3px;border-radius:5px;cursor:pointer;letter-spacing:0.5px;transition:all 0.15s;text-align:center;}
  .cm-btn:hover{color:var(--fg);border-color:var(--fg);}
  .cm-btn.active{background:var(--active-bg);color:var(--fg);border-color:var(--fg);}
  .cm-swatch{display:block;width:100%;height:5px;border-radius:3px;margin-top:3px;}

  .slider-row{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--dim);}
  .slider-row input[type=range]{flex:1;accent-color:var(--fg);}
  .slider-row span.val{min-width:26px;text-align:right;color:var(--fg);font-size:11px;}

  .toggle-row{display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--dim);}
  .tog{position:relative;width:34px;height:17px;background:var(--border);border-radius:9px;cursor:pointer;border:1px solid var(--border);transition:background 0.2s;flex-shrink:0;}
  .tog.on{background:rgba(0,255,65,0.2);border-color:var(--fg);}
  .tog::after{content:'';position:absolute;top:2px;left:2px;width:11px;height:11px;border-radius:50%;background:var(--dim);transition:transform 0.2s,background 0.2s;}
  .tog.on::after{transform:translateX(17px);background:var(--fg);}

  .act{font-family:'Share Tech Mono',monospace;font-size:10px;background:transparent;color:var(--dim);border:1px solid var(--border);padding:6px;border-radius:5px;cursor:pointer;letter-spacing:1px;width:100%;transition:all 0.15s;}
  .act:hover{color:var(--fg);border-color:var(--fg);}
  .act.active{background:var(--active-bg);color:var(--fg);border-color:var(--fg);}
  .act.hi{border-color:var(--accent);color:var(--accent);}
  .act.hi:hover{background:rgba(0,204,51,0.1);}

  #custom-wrap{display:none;flex-direction:column;gap:4px;}
  #custom-wrap.show{display:flex;}
  .color-row{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--dim);}
  input[type=color]{width:28px;height:20px;border:1px solid var(--border);border-radius:3px;background:none;cursor:pointer;padding:1px;}
  input[type=text]{font-family:'Share Tech Mono',monospace;font-size:10px;background:#0d0d0d;color:var(--fg);border:1px solid var(--border);padding:4px 6px;border-radius:4px;width:100%;}
  input[type=text]::placeholder{color:var(--dim);}

  /* FX toggles */
  #fx-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}

  /* MAIN */
  #main-col{flex:1;display:flex;flex-direction:column;gap:8px;}
  #header{display:flex;align-items:baseline;gap:10px;}
  #title{font-family:'VT323',monospace;font-size:30px;letter-spacing:2px;}
  #status{font-size:11px;color:var(--dim);letter-spacing:1px;}
  #fps-badge{font-size:11px;color:var(--dim);margin-left:auto;}

  #viewport{position:relative;background:var(--bg);border-radius:8px;border:1px solid var(--border);overflow:hidden;min-height:300px;}
  #ascii-canvas{display:block;width:100%;}

  #overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:var(--bg);font-family:'VT323',monospace;font-size:20px;color:var(--dim);letter-spacing:2px;z-index:2;}

  /* fullscreen */
  #app.fullscreen{position:fixed;inset:0;max-width:100%;padding:0;z-index:999;background:var(--bg);}
  #app.fullscreen #sidebar{display:none;}
  #app.fullscreen #main-col{padding:6px;}

  /* toast */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:#111;border:1px solid var(--fg);color:var(--fg);font-family:'Share Tech Mono',monospace;font-size:12px;padding:8px 18px;border-radius:6px;opacity:0;transition:opacity 0.3s,transform 0.3s;pointer-events:none;z-index:9999;letter-spacing:1px;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* kbd hints */
  .kbd{font-size:9px;color:var(--dim);letter-spacing:0.5px;margin-top:2px;}

  video{display:none;}

  @media(max-width:700px){
    #app{flex-direction:column;}
    #sidebar{width:100%;max-height:none;}
    .grid2{grid-template-columns:repeat(4,1fr);}
  }
</style>
</head>
<body>
<div id="app">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="s-title">// SETTINGS</div>

    <!-- Source -->
    <div class="s-section">
      <div class="s-label">Source</div>
      <div class="grid2">
        <button class="pill active" onclick="setSource('camera',this)">CAMERA</button>
        <button class="pill" onclick="setSource('image',this)" id="img-btn">IMAGE</button>
      </div>
      <input type="file" id="img-upload" accept="image/*" style="display:none" onchange="loadImage(this)">
    </div>

    <!-- Char Set -->
    <div class="s-section">
      <div class="s-label">Char Set</div>
      <div class="grid2">
        <button class="pill active" onclick="setCharSet('detailed',this)">DETAIL</button>
        <button class="pill" onclick="setCharSet('simple',this)">SIMPLE</button>
        <button class="pill" onclick="setCharSet('blocks',this)">BLOCKS</button>
        <button class="pill" onclick="setCharSet('binary',this)">BINARY</button>
        <button class="pill" onclick="setCharSet('matrix',this)">MATRIX</button>
        <button class="pill" onclick="setCharSet('braille',this)">BRAILLE</button>
        <button class="pill" onclick="setCharSet('minimal',this)">DOTS</button>
        <button class="pill" onclick="setCharSet('custom_chars',this)">CUSTOM</button>
      </div>
      <input type="text" id="custom-chars-input" placeholder="type chars light→dark" style="display:none" oninput="updateCustomChars(this.value)">
    </div>

    <!-- Font Size -->
    <div class="s-section">
      <div class="s-label">Font Size</div>
      <div class="slider-row">
        <span>S</span>
        <input type="range" min="7" max="20" value="13" step="1" oninput="updateFontSize(this.value)">
        <span>L</span>
        <span class="val" id="font-val">13</span>
      </div>
    </div>

    <!-- Color Mode -->
    <div class="s-section">
      <div class="s-label">Color Mode</div>
      <div class="grid2">
        <button class="cm-btn active" onclick="setColorMode('real',this)">REAL<span class="cm-swatch" style="background:linear-gradient(90deg,#f00,#0f0,#00f)"></span></button>
        <button class="cm-btn" onclick="setColorMode('green',this)">GREEN<span class="cm-swatch" style="background:linear-gradient(90deg,#001,#0f4)"></span></button>
        <button class="cm-btn" onclick="setColorMode('amber',this)">AMBER<span class="cm-swatch" style="background:linear-gradient(90deg,#110,#fa0)"></span></button>
        <button class="cm-btn" onclick="setColorMode('cyan',this)">CYAN<span class="cm-swatch" style="background:linear-gradient(90deg,#001,#0ff)"></span></button>
        <button class="cm-btn" onclick="setColorMode('red',this)">RED<span class="cm-swatch" style="background:linear-gradient(90deg,#100,#f44)"></span></button>
        <button class="cm-btn" onclick="setColorMode('purple',this)">PURP<span class="cm-swatch" style="background:linear-gradient(90deg,#101,#c4f)"></span></button>
        <button class="cm-btn" onclick="setColorMode('white',this)">WHITE<span class="cm-swatch" style="background:linear-gradient(90deg,#222,#fff)"></span></button>
        <button class="cm-btn" onclick="setColorMode('rainbow',this)">RAIN<span class="cm-swatch" style="background:linear-gradient(90deg,#f00,#ff0,#0f0,#00f,#f0f)"></span></button>
        <button class="cm-btn" onclick="setColorMode('custom',this)" style="grid-column:span 2">CUSTOM<span class="cm-swatch" id="custom-swatch" style="background:linear-gradient(90deg,#000,#f0f)"></span></button>
      </div>
      <div id="custom-wrap">
        <div class="color-row"><span>Dark</span><input type="color" id="cc-dark" value="#000000" oninput="updateCustomColor()"><span id="cc-dh" style="color:var(--fg);font-size:9px">#000000</span></div>
        <div class="color-row"><span>Bright</span><input type="color" id="cc-bright" value="#ff00ff" oninput="updateCustomColor()"><span id="cc-bh" style="color:var(--fg);font-size:9px">#ff00ff</span></div>
      </div>
    </div>

    <!-- Image Adjustments -->
    <div class="s-section">
      <div class="s-label">Adjust</div>
      <div class="slider-row"><span>BRIGHT</span><input type="range" min="-100" max="100" value="0" step="1" oninput="updateAdj('brightness',this.value)"><span class="val" id="br-val">0</span></div>
      <div class="slider-row"><span>CONTR</span><input type="range" min="-100" max="100" value="0" step="1" oninput="updateAdj('contrast',this.value)"><span class="val" id="co-val">0</span></div>
    </div>

    <!-- Background -->
    <div class="s-section">
      <div class="s-label">Background</div>
      <div class="slider-row">
        <span>◼</span>
        <input type="range" min="0" max="60" value="10" step="1" oninput="updateBg(this.value)">
        <span>◻</span>
      </div>
    </div>

    <!-- Columns -->
    <div class="s-section">
      <div class="s-label">Columns</div>
      <div class="slider-row">
        <input type="range" min="30" max="200" value="90" step="5" oninput="updateCols(this.value)">
        <span class="val" id="cols-val">90</span>
      </div>
    </div>

    <!-- FPS -->
    <div class="s-section">
      <div class="s-label">FPS Cap</div>
      <div class="grid3">
        <button class="pill" onclick="setFps(10,this)">10</button>
        <button class="pill active" onclick="setFps(20,this)">20</button>
        <button class="pill" onclick="setFps(30,this)">30</button>
      </div>
    </div>

    <!-- Toggles -->
    <div class="s-section">
      <div class="toggle-row"><span>MIRROR</span><div class="tog on" id="t-mirror" onclick="toggleOpt('mirror',this)"></div></div>
      <div class="toggle-row" style="margin-top:5px"><span>INVERT</span><div class="tog" id="t-invert" onclick="toggleOpt('invert',this)"></div></div>
    </div>

    <!-- FX -->
    <div class="s-section">
      <div class="s-label">Effects</div>
      <div id="fx-grid">
        <button class="pill" id="fx-glitch" onclick="toggleFx('glitch',this)">GLITCH</button>
        <button class="pill" id="fx-rain" onclick="toggleFx('rain',this)">RAIN</button>
        <button class="pill" id="fx-hue" onclick="toggleFx('hue',this)">HUE ROT</button>
        <button class="pill" id="fx-edge" onclick="toggleFx('edge',this)">EDGES</button>
        <button class="pill" id="fx-ca" onclick="toggleFx('ca',this)">CHROM AB</button>
        <button class="pill" id="fx-scan" onclick="toggleFx('scan',this)">SCANLINE</button>
      </div>
    </div>

    <!-- Actions -->
    <div class="s-section">
      <button class="act" id="pause-btn" onclick="togglePause()" style="display:none">⏸ PAUSE</button>
      <button class="act" onclick="copyText()">📋 COPY TEXT</button>
      <button class="act" onclick="saveFrame()" id="save-btn" style="display:none">💾 SAVE PNG</button>
      <button class="act" onclick="toggleFullscreen()">⛶ FULLSCREEN</button>
      <div class="kbd">SPACE=pause  S=save  F=full  ←→=cols</div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main-col">
    <div id="header">
      <span id="title">ASCII CAM</span>
      <span id="status">// ready</span>
      <span id="fps-badge"></span>
    </div>
    <div id="viewport">
      <canvas id="ascii-canvas"></canvas>
      <div id="overlay">
        <div>[ NO SIGNAL ]</div>
        <button class="act hi" style="width:auto;padding:10px 28px;font-size:14px;" onclick="startCamera()">INIT CAMERA</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>
<video id="video" autoplay playsinline muted></video>

<script>
// ── CONFIG ──────────────────────────────────────────────
const CHAR_SETS = {
  detailed:     ' .`-_\':,;r^=+/"|\\<>ivxclrs{}#@',
  simple:       ' .oO0@',
  blocks:       ' ░▒▓█',
  binary:       ' 01',
  matrix:       ' ｦｧｨｩｪｫｬｭｮｯｱｲｳｴｵ01',
  braille:      ' ⠁⠂⠃⠄⠅⠆⠇⠈⠉⠊⠋⠌⠍⠎⠏⠿',
  minimal:      ' ·∙•',
  custom_chars: ' .oO@',
};

// ── STATE ───────────────────────────────────────────────
let charSet   = CHAR_SETS.detailed;
let colorMode = 'real';
let numCols   = 90;
let fontSize  = 13;
let fontW     = 8;
let invert    = false;
let mirror    = true;
let paused    = false;
let running   = false;
let lastTime  = 0;
let fpsInterval = 50;
let bgLevel   = 10;
let brightness= 0;
let contrast  = 0;
let hueAngle  = 0;
let sourceMode= 'camera'; // 'camera' | 'image'
let imgBitmap = null;

let customDark   = [0,0,0];
let customBright = [255,0,255];

// FX flags
const fx = { glitch:false, rain:false, hue:false, edge:false, ca:false, scan:false };

// Rain state
const rainCols = [];
let rainInitialized = false;

// ── DOM ─────────────────────────────────────────────────
const video    = document.getElementById('video');
const canvas   = document.getElementById('ascii-canvas');
const ctx      = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const overlay  = document.getElementById('overlay');
const fpsBadge = document.getElementById('fps-badge');
const pauseBtn = document.getElementById('pause-btn');
const saveBtn  = document.getElementById('save-btn');

const sample   = document.createElement('canvas');
const sCtx     = sample.getContext('2d', {willReadFrequently:true});

// ── CAMERA ──────────────────────────────────────────────
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:false
    });
    video.srcObject = stream;
    await video.play();
    overlay.style.display = 'none';
    pauseBtn.style.display = '';
    saveBtn.style.display  = '';
    statusEl.textContent   = '// streaming';
    sourceMode = 'camera';
    if (!running) { running = true; requestAnimationFrame(loop); }
  } catch(e) {
    overlay.innerHTML = `<div style="color:#f44;font-size:16px;">CAMERA DENIED</div><div style="font-size:12px;margin-top:6px;color:#666;">${e.message}</div>`;
  }
}

// ── IMAGE SOURCE ────────────────────────────────────────
function setSource(mode, btn) {
  document.querySelectorAll('#sidebar .s-section:first-of-type .pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if (mode === 'image') {
    document.getElementById('img-upload').click();
  } else {
    sourceMode = 'camera';
    if (!running) startCamera();
  }
}

function loadImage(input) {
  const file = input.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    createImageBitmap(img).then(bmp => {
      imgBitmap = bmp;
      sourceMode = 'image';
      overlay.style.display = 'none';
      saveBtn.style.display = '';
      statusEl.textContent = '// image loaded';
      if (!running) { running = true; requestAnimationFrame(loop); }
      drawFrame();
    });
  };
  img.src = url;
}

// ── MAIN LOOP ───────────────────────────────────────────
function loop(ts) {
  requestAnimationFrame(loop);
  if (paused && sourceMode==='camera') return;
  if (sourceMode==='camera' && video.readyState < 2) return;
  if (ts - lastTime < fpsInterval) return;
  fpsBadge.textContent = Math.round(1000/(ts-lastTime)) + ' fps';
  lastTime = ts;
  if (fx.hue) hueAngle = (hueAngle + 1) % 360;
  drawFrame();
}

// ── DRAW ────────────────────────────────────────────────
function drawFrame() {
  const src    = sourceMode === 'image' ? imgBitmap : video;
  const srcW   = sourceMode === 'image' ? imgBitmap.width  : video.videoWidth  || 640;
  const srcH   = sourceMode === 'image' ? imgBitmap.height : video.videoHeight || 480;
  const aspect = srcH / srcW || 0.75;
  const rows   = Math.max(1, Math.round(numCols * aspect * (fontW / fontSize)));

  sample.width  = numCols;
  sample.height = rows;

  // apply brightness/contrast/hue via filter
  let filter = '';
  if (brightness !== 0) filter += `brightness(${1 + brightness/100}) `;
  if (contrast   !== 0) filter += `contrast(${1 + contrast/100}) `;
  if (fx.hue)           filter += `hue-rotate(${hueAngle}deg) `;
  sCtx.filter = filter || 'none';

  if (mirror && sourceMode==='camera') {
    sCtx.save(); sCtx.translate(numCols,0); sCtx.scale(-1,1);
  }
  sCtx.drawImage(src, 0, 0, numCols, rows);
  if (mirror && sourceMode==='camera') sCtx.restore();
  sCtx.filter = 'none';

  let pixels;
  try { pixels = sCtx.getImageData(0,0,numCols,rows).data; }
  catch(e) { statusEl.textContent = '// use localhost — file:// blocked'; return; }

  // Edge detection (Sobel) — precompute lum map
  let lumMap = null;
  if (fx.edge) {
    lumMap = new Float32Array(numCols * rows);
    for (let i=0;i<numCols*rows;i++) {
      const p=i*4;
      lumMap[i] = 0.299*pixels[p]+0.587*pixels[p+1]+0.114*pixels[p+2];
    }
  }

  canvas.width  = numCols * fontW;
  canvas.height = rows    * fontSize;
  const bg = bgLevel;
  ctx.fillStyle = `rgb(${bg},${bg},${bg})`;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.font = `${fontSize}px "Share Tech Mono",monospace`;
  ctx.textBaseline = 'top';

  const maxIdx = charSet.length - 1;
  const colorFn = getColorFn();

  for (let y=0;y<rows;y++) {
    for (let x=0;x<numCols;x++) {
      const i  = (y*numCols+x)*4;
      let r=pixels[i], g=pixels[i+1], b=pixels[i+2];

      // Chromatic aberration offset
      if (fx.ca) {
        const ox = Math.min(numCols-1, x+1);
        const bx = Math.max(0, x-1);
        r = pixels[(y*numCols+ox)*4];
        b = pixels[(y*numCols+bx)*4+2];
      }

      const lum = 0.299*r + 0.587*g + 0.114*b;
      let val = invert ? 255-lum : lum;

      // Edge detection overrides
      let ch;
      if (fx.edge && lumMap) {
        const sobel = sobelAt(lumMap, x, y, numCols, rows);
        if (sobel > 40) {
          ch = '@';
          ctx.fillStyle = colorFn(r,g,b,val);
          ctx.fillText(ch, x*fontW, y*fontSize);
          continue;
        } else {
          ch = ' ';
          continue;
        }
      }

      // Glitch — randomly replace chars
      if (fx.glitch && Math.random() < 0.005) {
        ch = CHAR_SETS.matrix[Math.floor(Math.random()*CHAR_SETS.matrix.length)];
        ctx.fillStyle = '#00ff41';
        ctx.fillText(ch, x*fontW, y*fontSize);
        continue;
      }

      const idx = Math.max(0, Math.min(maxIdx, Math.floor(val/255*maxIdx)));
      ch = charSet[idx];
      if (!ch || !ch.trim()) continue;
      ctx.fillStyle = colorFn(r,g,b,val);
      ctx.fillText(ch, x*fontW, y*fontSize);
    }
  }

  // Rain FX overlay
  if (fx.rain) drawRain(numCols, rows);

  // Scanline overlay
  if (fx.scan) {
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    for (let y=0;y<canvas.height;y+=fontSize*2) {
      ctx.fillRect(0, y, canvas.width, Math.ceil(fontSize*0.6));
    }
  }
}

function sobelAt(lum, x, y, w, h) {
  const get = (cx,cy) => lum[Math.min(h-1,Math.max(0,cy))*w + Math.min(w-1,Math.max(0,cx))];
  const gx = -get(x-1,y-1)+get(x+1,y-1) + -2*get(x-1,y)+2*get(x+1,y) + -get(x-1,y+1)+get(x+1,y+1);
  const gy = -get(x-1,y-1)-2*get(x,y-1)-get(x+1,y-1) + get(x-1,y+1)+2*get(x,y+1)+get(x+1,y+1);
  return Math.sqrt(gx*gx+gy*gy);
}

// Rain drop columns
function drawRain(cols, rows) {
  if (!rainInitialized || rainCols.length !== cols) {
    rainCols.length = 0;
    for (let i=0;i<cols;i++) rainCols.push({y: Math.random()*rows|0, speed: 0.3+Math.random()*0.7});
    rainInitialized = true;
  }
  ctx.font = `${fontSize}px "Share Tech Mono",monospace`;
  ctx.textBaseline = 'top';
  for (let x=0;x<cols;x++) {
    const drop = rainCols[x];
    const ch = CHAR_SETS.matrix[Math.floor(Math.random()*CHAR_SETS.matrix.length)] || '0';
    ctx.fillStyle = '#00ff41';
    ctx.globalAlpha = 0.85;
    ctx.fillText(ch, x*fontW, (drop.y|0)*fontSize);
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#004d14';
    if ((drop.y|0)-1 >= 0) ctx.fillText(ch, x*fontW, ((drop.y|0)-1)*fontSize);
    ctx.globalAlpha = 1;
    drop.y += drop.speed;
    if (drop.y >= rows) drop.y = 0;
  }
}

// ── COLOR FNS ───────────────────────────────────────────
function getColorFn() {
  switch(colorMode) {
    case 'real':    return (r,g,b)      => `rgb(${r},${g},${b})`;
    case 'green':   return (_,__,___,l) => `rgb(0,${l*.9|0},${l*.3|0})`;
    case 'amber':   return (_,__,___,l) => `rgb(${l*.95|0},${l*.6|0},0)`;
    case 'cyan':    return (_,__,___,l) => `rgb(0,${l*.85|0},${l|0})`;
    case 'red':     return (_,__,___,l) => `rgb(${l|0},${l*.15|0},${l*.15|0})`;
    case 'purple':  return (_,__,___,l) => `rgb(${l*.7|0},0,${l|0})`;
    case 'white':   return (_,__,___,l) => `rgb(${l|0},${l|0},${l|0})`;
    case 'rainbow': return (r,g,b,l)    => { const h=(hueAngle+(l/255)*120)%360; return `hsl(${h},100%,55%)`; };
    case 'custom':  return customColorFn;
    default:        return (r,g,b)      => `rgb(${r},${g},${b})`;
  }
}

function customColorFn(r,g,b,lum) {
  const t=lum/255;
  const [dr,dg,db]=customDark, [br,bg2,bb]=customBright;
  return `rgb(${(dr+(br-dr)*t)|0},${(dg+(bg2-dg)*t)|0},${(db+(bb-db)*t)|0})`;
}
function hexToRgb(h){const n=parseInt(h.slice(1),16);return[(n>>16)&255,(n>>8)&255,n&255];}

// ── UI HANDLERS ─────────────────────────────────────────
function setCharSet(name, btn) {
  charSet = CHAR_SETS[name] || CHAR_SETS.detailed;
  document.querySelectorAll('.pill').forEach(b=>{if(b.closest('.s-section') && b.parentElement.children.length >= 6) b.classList.remove('active');});
  // target only char set section buttons
  btn.classList.add('active');
  const ci = document.getElementById('custom-chars-input');
  ci.style.display = name==='custom_chars' ? 'block' : 'none';
}

function updateCustomChars(val) {
  if (val.trim().length >= 2) {
    CHAR_SETS.custom_chars = val;
    charSet = val;
  }
}

function setColorMode(name, btn) {
  colorMode = name;
  document.querySelectorAll('.cm-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('custom-wrap').classList.toggle('show', name==='custom');
}

function updateCustomColor() {
  const d=document.getElementById('cc-dark').value;
  const br=document.getElementById('cc-bright').value;
  customDark=hexToRgb(d); customBright=hexToRgb(br);
  document.getElementById('cc-dh').textContent=d;
  document.getElementById('cc-bh').textContent=br;
  document.getElementById('custom-swatch').style.background=`linear-gradient(90deg,${d},${br})`;
}

function updateFontSize(v) {
  fontSize = +v; fontW = Math.round(fontSize * 0.6);
  document.getElementById('font-val').textContent = v;
}

function updateCols(v) { numCols=+v; document.getElementById('cols-val').textContent=v; rainInitialized=false; }
function updateBg(v) { bgLevel=+v; }
function updateAdj(type, v) {
  if (type==='brightness') { brightness=+v; document.getElementById('br-val').textContent=v; }
  else { contrast=+v; document.getElementById('co-val').textContent=v; }
}

function setFps(fps, btn) {
  fpsInterval = 1000/fps;
  document.querySelectorAll('#sidebar .grid3 .pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function toggleOpt(name, el) {
  if (name==='mirror') mirror=!mirror;
  if (name==='invert') invert=!invert;
  el.classList.toggle('on');
}

function toggleFx(name, btn) {
  fx[name] = !fx[name];
  btn.classList.toggle('active', fx[name]);
  if (name==='rain' && !fx.rain) rainInitialized=false;
}

function togglePause() {
  paused=!paused;
  pauseBtn.textContent=paused?'▶ RESUME':'⏸ PAUSE';
  pauseBtn.classList.toggle('active',paused);
  statusEl.textContent=paused?'// paused':'// streaming';
}

function saveFrame() {
  const link=document.createElement('a');
  link.download='ascii_frame.png';
  link.href=canvas.toDataURL('image/png');
  link.click();
  toast('Frame saved!');
}

function copyText() {
  // render ASCII as plain text
  const src    = sourceMode==='image' ? imgBitmap : video;
  const srcW   = sourceMode==='image' ? imgBitmap?.width||640  : video.videoWidth||640;
  const srcH   = sourceMode==='image' ? imgBitmap?.height||480 : video.videoHeight||480;
  const rows   = Math.max(1, Math.round(numCols * (srcH/srcW) * (fontW/fontSize)));
  sample.width=numCols; sample.height=rows;
  sCtx.drawImage(src,0,0,numCols,rows);
  let pixels;
  try{pixels=sCtx.getImageData(0,0,numCols,rows).data;}catch(e){toast('Cannot read pixels');return;}
  const maxIdx=charSet.length-1;
  let text='';
  for(let y=0;y<rows;y++){
    for(let x=0;x<numCols;x++){
      const i=(y*numCols+x)*4;
      const lum=0.299*pixels[i]+0.587*pixels[i+1]+0.114*pixels[i+2];
      const val=invert?255-lum:lum;
      const idx=Math.max(0,Math.min(maxIdx,Math.floor(val/255*maxIdx)));
      text+=charSet[idx]||' ';
    }
    text+='\n';
  }
  navigator.clipboard.writeText(text).then(()=>toast('Copied to clipboard!')).catch(()=>toast('Copy failed'));
}

function toggleFullscreen() {
  document.getElementById('app').classList.toggle('fullscreen');
}

function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

// ── KEYBOARD SHORTCUTS ──────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT') return;
  switch(e.key) {
    case ' ': e.preventDefault(); if(pauseBtn.style.display!=='none') togglePause(); break;
    case 's': case 'S': if(saveBtn.style.display!=='none') saveFrame(); break;
    case 'f': case 'F': toggleFullscreen(); break;
    case 'ArrowRight': numCols=Math.min(200,numCols+5); document.getElementById('cols-val').textContent=numCols; break;
    case 'ArrowLeft':  numCols=Math.max(30,numCols-5);  document.getElementById('cols-val').textContent=numCols; break;
  }
});

// Page Visibility API — pause render when tab hidden
document.addEventListener('visibilitychange', () => {
  if (document.hidden) paused=true;
  else if (sourceMode==='camera') paused=false;
});
</script>
